<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Suki - ArrayList&lt;Suki&gt;</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
/* ダークテーマ共通設定 */
body {
	background-color: #121212;
	color: #e0e0e0;
	font-family: 'Helvetica Neue', Arial, sans-serif;
	padding-bottom: 80px;
}

.form-container {
	max-width: 600px;
	margin: 50px auto;
	background: #1e1e1e;
	padding: 30px;
	border-radius: 15px;
	box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
	border: 1px solid #333;
}

/* 入力フォームのカスタマイズ */
.form-label {
	color: #2ecc71; /* ログイン画面と統一した緑 */
}

.form-control, .form-select {
	background-color: #252525;
	border: 1px solid #444;
	color: #fff;
}

.form-control:focus, .form-select:focus {
	background-color: #2a2a2a;
	border-color: #2ecc71;
	color: #fff;
	box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.25);
}

/* ジャンル別の詳細エリア（ダークモード用に調整） */
.sub-fields {
	display: none;
	background-color: #2a2a2a !important;
	border-left: 4px solid #2ecc71 !important;
	border-top: none;
	border-right: none;
	border-bottom: none;
}

/* 緑ボタン */
.btn-custom-green {
	background-color: #2ecc71;
	border: none;
	color: white;
	font-weight: bold;
	padding: 12px;
	transition: 0.3s;
}

.btn-custom-green:hover {
	background-color: #27ae60;
	color: white;
	box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
}

/* 評価ボタン */
.rating {
	display: flex;
	flex-direction: row-reverse;
	justify-content: flex-end;
	font-size: 2.5rem;
}

.rating input {
	display: none;
}

.rating label {
	color: #444;
	cursor: pointer;
	transition: 0.2s;
	margin-right: 5px;
}

.rating input:checked ~ label, .rating label:hover, .rating label:hover 
	~ label {
	color: #ffc107;
	text-shadow: 0 0 10px rgba(255, 193, 7, 0.4);
}

/* プレースホルダーの色を薄灰色に */
::placeholder {
	color: #888888 !important;
	opacity: 1;
}
</style>
</head>
<body>

	<div class="container">
		<div class="form-container">
			<h2 class="text-center mb-4 text-white fw-bold">New Collection</h2>
			<p class="text-center text-secondary small">お気に入りの作品を記録しよう</p>

			<form th:action="@{/complete}" method="post"
				enctype="multipart/form-data">

				<div class="mb-4">
					<label for="category" class="form-label fw-bold small">CATEGORY</label>
					<select class="form-select" id="category" name="category"
						onchange="toggleFields()" required>
						<option value="" disabled selected>選択してください</option>
						<option value="1">📖 ブック (Book)</option>
						<option value="2">🎬 ムービー (Movie)</option>
						<option value="3">🎮 ゲーム (Game)</option>
						<option value="99">✨ その他 (Other)</option>
					</select>
				</div>

				<div id="itemFields" class="sub-fields p-3 mb-4 rounded">
					<p class="small text-info fw-bold mb-2">本の詳細情報</p>
					<input type="text" name="creator" class="form-control mb-2"
						placeholder="著者名"> <input type="text" name="publisher"
						class="form-control mb-2" placeholder="出版社"> <input
						type="text" name="subAttribute" class="form-control"
						placeholder="ジャンル（ミステリー等）">
				</div>

				<div id="movieFields" class="sub-fields p-3 mb-4 rounded">
					<p class="small text-warning fw-bold mb-2">映画の詳細情報</p>
					<input type="text" name="creator" class="form-control mb-2"
						placeholder="監督名"> <input type="text" name="subAttribute"
						class="form-control mb-2" placeholder="ジャンル（SF等）"> <select
						name="publisher" class="form-select">
						<option value="" selected>邦画 / 洋画 / その他</option>
						<option value="邦画">邦画</option>
						<option value="洋画">洋画</option>
						<option value="その他">その他</option>
					</select>
				</div>

				<div id="gameFields" class="sub-fields p-3 mb-4 rounded">
					<p class="small text-success fw-bold mb-2">ゲームの詳細情報</p>
					<input type="text" name="creator" class="form-control mb-2"
						placeholder="メーカー"> <input type="text" name="publisher"
						class="form-control mb-2" placeholder="ハード（Switch等）"> <input
						type="text" name="subAttribute" class="form-control"
						placeholder="ジャンル（RPG等）">
				</div>

				<div id="otherFields" class="sub-fields p-3 mb-4 rounded">
					<p class="small text-secondary fw-bold mb-2">その他の詳細情報</p>
					<input type="text" name="creator" class="form-control mb-2"
						placeholder="作者・制作名"> <input type="text"
						name="subAttribute" class="form-control mb-2"
						placeholder="特徴1（ジャンル、種類など）"> <input type="text"
						name="publisher" class="form-control" placeholder="特徴2（場所、ブランドなど）">
				</div>

				<div class="mb-3">
					<label for="title" class="form-label fw-bold small">TITLE</label> <input
						type="text" class="form-control" id="title" name="title"
						placeholder="タイトルを入力" required>
				</div>

				<div class="mb-3">
					<label class="form-label fw-bold small">THUMBNAIL</label> <input
						type="file" name="thumbnail" class="form-control" accept="image/*">
				</div>

				<div class="mb-3">
					<label for="reviewText" class="form-label fw-bold small">REVIEW</label>
					<textarea class="form-control" id="reviewText" name="reviewText"
						rows="4" placeholder="感想を教えてください" maxlength="255" required></textarea>
					<div class="text-end small text-secondary">
						<span id="charCount">0</span> / 255
					</div>
				</div>

				<div class="mb-4">
					<label class="form-label fw-bold small">SCORE</label>
					<div class="rating">
						<input type="radio" name="score" value="5" id="star5" required><label
							for="star5">★</label> <input type="radio" name="score" value="4"
							id="star4"><label for="star4">★</label> <input
							type="radio" name="score" value="3" id="star3"><label
							for="star3">★</label> <input type="radio" name="score" value="2"
							id="star2"><label for="star2">★</label> <input
							type="radio" name="score" value="1" id="star1"><label
							for="star1">★</label>
					</div>
				</div>

				<div class="d-grid gap-3 mt-5">
					<button type="submit" class="btn btn-custom-green btn-lg">保存して登録</button>
					<a th:href="@{/mypage}" class="btn btn-outline-secondary btn-sm">キャンセルして戻る</a>
				</div>

			</form>
		</div>
	</div>

	<footer
		style="text-align: center; font-size: 0.8em; color: #666; padding: 2em 0;">
		&copy; 2026 Cチーム(仮) All Rights Reserved. </footer>

	<script>
    
    const textarea = document.getElementById("reviewText");
    const charCount = document.getElementById("charCount");
    textarea.addEventListener("input", function () {
        charCount.textContent = textarea.value.length;
    });
    
    function toggleFields() {
        const category = document.getElementById("category").value;
        
        const groups = {
            "1": document.getElementById("itemFields"),
            "2": document.getElementById("movieFields"),
            "3": document.getElementById("gameFields"),
            "99": document.getElementById("otherFields")
        };

        Object.keys(groups).forEach(key => {
            const target = groups[key];
            if (target) {
                if (key === category) {
                    target.style.display = "block";
                    target.querySelectorAll("input, select").forEach(i => i.disabled = false);
                } else {
                    target.style.display = "none";
                    target.querySelectorAll("input, select").forEach(i => i.disabled = true);
                }
            }
        });
    }
    // ページ読み込み時にも実行
    document.addEventListener("DOMContentLoaded", toggleFields);
    </script>
</body>
</html>
