<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>閲覧ページ</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
body {
	background-color: #121212;
	color: #e0e0e0;
	font-family: 'Helvetica Neue', Arial, sans-serif;
	/* 下部メニューの高さ分、余白を確保（スマホのみ） */
	padding-bottom: 80px;
}

.container-box {
	max-width: 700px;
	margin: 50px auto;
}

.card {
	background-color: #1e1e1e;
	border-radius: 12px;
	border: 1px solid #333;
	transition: all 0.3s ease;
	position: relative; /* いいねボタンの基準として必須 */
	overflow: hidden;
}
/* .card:hover {
	transform: translateY(-8px);
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
	border-color: #2ecc71;
} */
.card-img-top {
	height: 300px;
	object-fit: cover;
	filter: brightness(0.8);
	transition: 0.3s;
}

/* .card:hover .card-img-top {
	filter: brightness(1.0);
} */
.card-link {
	text-decoration: none;
	color: inherit;
}

.btn-custom-green {
	background-color: #2ecc71;
	color: #fff;
	border: none;
	font-weight: bold;
	padding: 8px 20px;
	border-radius: 8px;
	transition: 0.3s;
}

.btn-custom-green:hover {
	background-color: #27ae60; /* 少し濃い緑 */
	color: #ffffff;
}

.rating {
	display: flex;
	flex-direction: row-reverse;
	justify-content: flex-end;
}

.rating input {
	display: none;
}

.rating label {
	font-size: 2rem;
	color: #ddd;
	cursor: pointer;
	transition: 0.2s;
}

.rating input:checked ~ label {
	color: #ffc107;
}

.rating label:hover, .rating label:hover ~ label {
	color: #ffc107;
}

.text-secondary-muted {
	/* color: #9e9e9e !important; */
	color: white;
}

.text-color-pink {
	color: pink;
}

/* --- いいねボタンの基本スタイル --- */
.like-button-overlay {
	position: absolute;
	top: 15px;
	right: 15px;
	background: rgba(0, 0, 0, 0.5); /* 通常時は暗い半透明 */
	width: 50px;
	height: 50px;
	border-radius: 50%;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 1.5rem;
	cursor: pointer;
	transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
	z-index: 10;
	text-decoration: none;
	border: 1px solid rgba(255, 255, 255, 0.1);
}

.like-button-overlay:hover {
	transform: scale(1.1);
	background: rgba(0, 0, 0, 0.7);
}

/* --- いいね済みの時（絵文字が❤️に切り替わり、背景も強調） --- */
.like-button-overlay.active {
	background: #ffffff; /* 背景を白にしてコントラストを最大化 */
	box-shadow: 0 0 20px rgba(255, 71, 87, 0.6); /* 赤い光の影を追加 */
	border: none;
}

.like-button-overlay.active:hover {
	background: #f8f8f8;
	transform: scale(1.2);
}
</style>
</head>
<body>
<div class="container container-box mt-5 mb-5">

    <div class="card shadow p-3">

        <!-- 作品画像＋いいねボタン -->
        <a th:href="@{/like/{id}(id=${item.id})}" class="like-button-overlay"
           th:classappend="${isLiked} ? 'active' : ''">
            <span th:text="${isLiked} ? '❤️' : '🤍'"></span>
        </a>

        <img th:if="${item.thumbnailUrl != null}" th:src="${item.thumbnailUrl}" 
             class="card-img-top mb-3">
        <div th:unless="${item.thumbnailUrl != null}" 
             class="card-img-top d-flex align-items-center justify-content-center mb-3"
             style="background: #252525; height: 200px;">
            <span class="text-secondary">No Image</span>
        </div>

        <!-- タイトル・クリエイター -->
        <h3 class="text-secondary-muted mb-1" th:text="${item.title}"></h3>
        <p class="text-secondary-muted mb-2" th:text="${item.creator}"></p>

        <div class="mb-3">
            <span class="text-warning fw-bold" th:if="${item.score != null}" 
                  th:text="'☆' + ${item.score}"></span>
        </div>

        <hr>

        <!-- コメント一覧 -->
        <div class="mb-3">
            <h5 class="fw-bold mb-2">💬 コメント</h5>

            <div th:if="${#lists.isEmpty(comments)}" class="text-color-pink mb-2">
                <p>まだコメントはありません</p>
            </div>

            <div th:each="c : ${comments}" class="mb-2">
                <p>
                    <strong th:text="${c.user.username}"
                            th:classappend="${c.user.id == item.user.id} ? 'text-danger fw-bold' : 'text-white'"></strong>
                </p>
                <p th:text="${c.content}"
                   th:classappend="${c.user.id == item.user.id} ? 'text-danger' : 'text-white'"></p>
                <hr>
            </div>
        </div>

        <!-- 自分のコメント投稿 -->
        <div th:if="${session.user != null}" class="mb-3">
            <form th:action="@{/view/{id}(id=${item.id})}" method="post" class="d-flex gap-2">
                <input type="text" name="comment" class="form-control"
                       th:value="${myComment != null ? myComment.content : ''}" />
                <button type="submit" class="btn btn-custom-green"
                        th:text="${myComment != null} ? 'コメントを編集' : 'コメント'"></button>
            </form>

            <form th:if="${myComment != null}" th:action="@{/comment/delete/{id}(id=${myComment.id})}" 
                  method="post" class="mt-2">
                <button type="submit" class="btn btn-outline-danger"
                        onclick="return confirm('本当に削除しますか？');">コメントを削除</button>
            </form>
        </div>

        <hr>

        <!-- ボタン類 -->
        <div class="d-flex justify-content-center flex-wrap gap-3 mt-3">
            <a th:href="@{/timeline}" class="btn btn-custom-green px-4">🌐 Timelineに戻る</a>
            <a th:href="@{/mypage}" class="btn btn-outline-light px-4">Collectionsに戻る</a>
<!--             <th:block th:with="isOwner=${session.user != null && item.user != null && session.user.id == item.user.id}">
                <a th:href="@{/edit/{id}(id=${item.id})}" class="btn btn-warning px-4"
                   th:classappend="${!isOwner} ? 'disabled'" th:aria-disabled="${!isOwner}">編集する</a>
                <form th:action="@{/delete/{id}(id=${item.id})}" method="post" onsubmit="return confirm('本当に削除しますか？')">
                    <button type="submit" class="btn btn-danger px-4" th:disabled="${!isOwner}">削除する</button>
                </form> -->
            </th:block>
        </div>

    </div>
</div>
</body>
</html>
