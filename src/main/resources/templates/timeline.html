<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>タイムライン - ArrayList&lt;Suki&gt;</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
body {
	background-color: #121212;
	color: #e0e0e0;
	font-family: 'Helvetica Neue', Arial, sans-serif;
	/* 下部メニューの高さ分、余白を確保（スマホのみ） */
	padding-bottom: 80px;
}

/* カードスタイル */
.card {
	background-color: #1e1e1e;
	border-radius: 12px;
	border: 1px solid #333;
	transition: all 0.3s ease;
	overflow: hidden;
}

.card:hover {
	transform: translateY(-8px);
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
	border-color: #2ecc71;
}

.card-img-top {
	height: 200px;
	object-fit: cover;
	filter: brightness(0.8);
	transition: 0.3s;
}

.card:hover .card-img-top {
	filter: brightness(1.0);
}

.card-link {
	text-decoration: none;
	color: inherit;
}

.card-title {
	color: #ffffff; /* 視認性向上のため少し明るくしました */
}

.card-body {
	color: #9e9e9e;
}

/* 緑ボタン */
.btn-custom-green {
	background-color: #2ecc71;
	color: #fff;
	border: none;
	font-weight: bold;
	padding: 8px 20px;
	border-radius: 8px;
	transition: 0.3s;
}

.btn-custom-green:hover {
	background-color: #27ae60;
	color: #fff;
}

/* カテゴリバッジ */
.badge-book {

	background-color:rgb(0, 128, 255);
}

.badge-movie {
	background-color: #d35400;
	padding: 0.4em 0.8em;
}

.badge-game {
	background-color: #27ae60;
	padding: 0.4em 0.8em;
}

.text-secondary-muted {
	color: #9e9e9e !important;
}

.text-color {
	color: white;
}

.text-color-pink {
    color: #ff79c6;
    font-size: 0.85em;
    margin-bottom: 0;
}
/* 下部固定メニュー：3ボタン完全均等配置用 */
.navbar-mobile {
	background-color: rgba(30, 30, 30, 0.9) !important;
	backdrop-filter: blur(10px);
	border-top: 1px solid #333;
}

.nav-item-wrapper {
	flex: 1; /* 各ボタンを33.3%ずつの幅にする */
	display: flex;
	justify-content: center;
	align-items: center;
}

.nav-icon-link {
	text-decoration: none;
	color: #9e9e9e;
	font-size: 0.75rem;
	transition: 0.2s;
	width: 100%;
}

.nav-icon-link:active {
	transform: scale(0.9);
}

/* 中央の＋ボタン用スタイル（3等分のうちの中央要素として扱う） */
.center-btn-container {
	flex: 1; /* 左右の要素と同じ幅を確保 */
	display: flex;
	justify-content: center;
	position: relative;
}

.center-add-btn {
	background-color: #2ecc71;
	width: 52px;
	height: 52px;
	border-radius: 50%;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 24px;
	color: white;
	box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
	margin-top: -26px; 
	border: 4px solid #121212;
}
</style>
</head>
<body>
	<div class="container mt-5 mb-5">
		<h2 class="fw-bold mb-4">🌐Timeline</h2>

		<div class="d-flex justify-content-end mb-4 gap-2">
			<a th:href="@{/mylikes}" class="btn btn-outline-danger btn-sm px-3">
			❤️ My Likes </a> <a th:href="@{/mypage}"
				class="btn btn-outline-light btn-sm px-3">
				Collectionsに戻る </a>
		</div>

		<div class="row row-cols-1 row-cols-md-3 g-4">

			<div class="col" th:each="item : ${sukiList}">

				<a
					th:href="${session.user?.id == item.user?.id} 
                ? @{/detail/{id}(id=${item.id})} 
                : @{/view/{id}(id=${item.id})}"
					class="card-link">
					<div class="card h-100">

						<img th:if="${item.thumbnailUrl != null}"
							th:src="${item.thumbnailUrl}" class="card-img-top">

						<div th:if="${item.thumbnailUrl == null}"
							class="card-img-top d-flex align-items-center justify-content-center"
							style="background: #252525; height: 200px;">
							<span class="text-secondary">No Image</span>
						</div>

						<div class="card-body">

							<div class="mb-2 d-flex justify-content-between align-items-center">
								<div>
									<span th:if="${item.category == '1'}" class="badge badge-book">📖 Book</span> 
									<span th:if="${item.category == '2'}" class="badge badge-movie">🎬 Movie</span> 
									<span th:if="${item.category == '3'}" class="badge badge-game">🎮 Game</span>
								</div>

								<p class="text-color-pink">
									投稿者: <span th:text="${item.user.username}"></span>
								</p>
							</div>

							<h5 class="fw-bold mb-2" th:text="${item.title}"></h5>

							<div class="small mb-3 fw-bold text-secondary">
								<span th:if="${item.category == '1'}"
									th:text="'Author: ' + ${item.creator}"></span> <span
									th:if="${item.category == '2'}"
									th:text="'Director: ' + ${item.creator}"></span> <span
									th:if="${item.category == '3'}"
									th:text="'Hardware: ' + ${item.publisher}"></span>
							</div>

							<div class="mb-3 d-flex align-items-center">
								<span class="me-3">
									<span style="color: #ff4757;">❤️</span> 
									<span th:text="${item.likeCount != null ? item.likeCount : 0}" class="ms-1 fw-bold">0</span>
								</span>
								<span>
									<span style="color: #1e90ff;">💬</span> 
									<span th:text="${item.commentCount != null ? item.commentCount : 0}" class="ms-1 fw-bold">0</span>
								</span>
							</div>

							<div class="mb-2">
								<span class="text-warning fw-bold" th:if="${item.score != null}"
									th:text=" '★ ' + ${item.score}">
								</span> 
								<span class="text-secondary small" th:if="${item.score == null}">
									未評価 </span>
							</div>

							<p class="card-text small text-truncate" th:text="${item.reviewText}"></p>

						</div>
					</div>
				</a>
			</div>
		</div>
	</div>
	<nav class="navbar navbar-mobile fixed-bottom py-0">
    <div class="container-fluid">
        <div class="d-flex align-items-center w-100">
            
            <div class="nav-item-wrapper">
    <a th:href="@{/mypage}" class="nav-icon-link text-center py-2">
        <div class="fs-4">📚</div>
        <div>Collections</div>
    </a>
</div>

            <div class="center-btn-container">
                <a th:href="@{/form}" class="text-decoration-none">
                    <div class="center-add-btn">＋</div>
                </a>
            </div>

            <div class="nav-item-wrapper">
                <a th:href="@{/mylikes}" class="nav-icon-link text-center py-2">
                    <div class="fs-4">❤️</div>
                    <div>Suki</div>
                </a>
            </div>

        </div>
    </div>
</nav>
<footer style="text-align:center; font-size:0.8em; color:#666; padding:1em 0;">
    &copy; 2026 Cチーム(仮) All Rights Reserved.
</footer>
</body>
</html>
