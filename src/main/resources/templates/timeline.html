<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>タイムライン - ArrayList&lt;Suki&gt;</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
body {
	background-color: #121212;
	color: #e0e0e0;
	font-family: 'Helvetica Neue', Arial, sans-serif;
	/* 下部メニューの高さ分、余白を確保（スマホのみ） */
	padding-bottom: 80px;
}

/* カードスタイル */
.card {
	background-color: #1e1e1e;
	border-radius: 12px;
	border: 1px solid #333;
	transition: all 0.3s ease;
	overflow: hidden;
}

.card:hover {
	transform: translateY(-8px);
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
	border-color: #2ecc71;
}

.card-img-top {
	height: 200px;
	object-fit: cover;
	filter: brightness(0.8);
	transition: 0.3s;
}

.card:hover .card-img-top {
	filter: brightness(1.0);
}

.card-link {
	text-decoration: none;
	color: inherit;
}

.card-title {
	color: #ffffff; /* 視認性向上のため少し明るくしました */
}

.card-body {
	color: #9e9e9e;
}

/* 緑ボタン */
.btn-custom-green {
	background-color: #2ecc71;
	color: #fff;
	border: none;
	font-weight: bold;
	padding: 8px 20px;
	border-radius: 8px;
	transition: 0.3s;
}

.btn-custom-green:hover {
	background-color: #27ae60;
	color: #fff;
}

/* カテゴリバッジ */
.badge-book {
	background-color: rgb(0, 128, 255);
}

.badge-movie {
	background-color: #d35400;
}

.badge-game {
	background-color: #27ae60;
}

.text-secondary-muted {
	color: #9e9e9e !important;
}

.text-color {
	color: white;
}
</style>
</head>
<body>
	<div class="container mt-5 mb-5">
		<h2 class="fw-bold mb-4">🌐Timeline</h2>

		<div class="d-flex justify-content-end mb-4 gap-2">
			<a th:href="@{/mylikes}" class="btn btn-outline-danger btn-sm px-3">
			❤️ My Likes </a> <a th:href="@{/mypage}"
				class="btn btn-outline-light btn-sm px-3">
				Collectionsに戻る </a>
		</div>

		<div class="row row-cols-1 row-cols-md-3 g-4">

			<div class="col" th:each="item : ${sukiList}">

				<a
					th:href="${session.user?.id == item.user?.id} 
                ? @{/detail/{id}(id=${item.id})} 
                : @{/view/{id}(id=${item.id})}"
					class="card-link">
					<div class="card h-100">

						<!-- 画像 -->
						<img th:if="${item.thumbnailUrl != null}"
							th:src="${item.thumbnailUrl}" class="card-img-top">

						<div th:if="${item.thumbnailUrl == null}"
							class="card-img-top d-flex align-items-center justify-content-center"
							style="background: #252525; height: 200px;">
							<span class="text-secondary">No Image</span>
						</div>

						<div class="card-body">

							<!-- カテゴリ -->
							<div class="mb-2">
								<span th:if="${item.category == '1'}" class="badge badge-book">📖
									Book</span> <span th:if="${item.category == '2'}"
									class="badge badge-movie">🎬 Movie</span> <span
									th:if="${item.category == '3'}" class="badge badge-game">🎮
									Game</span>

								<p class="text-color-pink">
									posted: <span th:text="${item.user.username}"></span>
								</p>
							</div>

							<!-- タイトル -->
							<h5 th:text="${item.title}"></h5>

							<!-- クリエイター -->
							<div class="small mb-2 fw-bold text-secondary">
								<span th:if="${item.category == '1'}"
									th:text="'Author: ' + ${item.creator}"></span> <span
									th:if="${item.category == '2'}"
									th:text="'Director: ' + ${item.creator}"></span> <span
									th:if="${item.category == '3'}"
									th:text="'Hardware: ' + ${item.publisher}"></span>
							</div>

							<!-- ❤️ 💬 -->
							<div class="mb-2">
								❤️ <span th:text="${item.likeCount}">0</span> 💬 <span
									th:text="${item.commentCount}">0</span>
							</div>

							<!-- 評価 -->
							<div class="mb-2">
								<span class="text-warning fw-bold" th:if="${item.score != null}"
									th:text=" '☆' + ${item.score}"> <!-- 例: 4 / 5 -->
								</span> <span class="text-color" th:if="${item.score == null}">
									未評価 </span>
							</div>

							<!-- レビュー -->
							<p th:text="${item.reviewText}"></p>

						</div>
					</div>
				</a>
			</div>
		</div>
	</div>
<footer style="text-align:center; font-size:0.8em; color:#666; padding:1em 0;">
    &copy; 2026 Cチーム(仮) All Rights Reserved.
</footer>
</body>
</html>
