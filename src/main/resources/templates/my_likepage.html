<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>My Likes - ArrayList&lt;Suki&gt;</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">

<style>
body {
	background-color: #121212;
	color: #e0e0e0;
	font-family: 'Helvetica Neue', Arial, sans-serif;
	/* 下部メニューの高さ分、余白を確保（スマホのみ） */
	padding-bottom: 80px;
}

/* タイムラインのカードスタイルを継承 */
.card {
	background-color: #1e1e1e;
	border-radius: 12px;
	border: 1px solid #333;
	transition: all 0.3s ease;
	overflow: hidden;
}

.card:hover {
	transform: translateY(-8px);
	box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.25);
	border-color: #2ecc71;
}

.card-img-top {
	height: 200px;
	object-fit: cover;
	filter: brightness(0.8);
	transition: 0.3s;
}

.card:hover .card-img-top {
	filter: brightness(1.0);
}

.card-link {
	text-decoration: none;
	color: inherit;
}

.card-title {
	color: #ffffff;
}

/* カテゴリバッジ（タイムラインと統一） */
.badge {
	padding: 5px 10px;
	border-radius: 20px;
	font-size: 0.75rem;
}

.badge-book {
	background-color: #2c3e50;
}

.badge-movie {
	background-color: #d35400;
}

.badge-game {
	background-color: #27ae60;
}

.text-secondary-muted {
	color: #9e9e9e !important;
}

/* ハートのアクセント */
.icon-heart {
	color: #e74c3c; /* いいねボタンと同じ赤系に調整 */
	margin-right: 10px;
}

/* データがない時の表示 */
.empty-container {
	text-align: center;
	padding: 80px 20px;
}
</style>
</head>
<body>
	<div class="container mt-5 mb-5">

		<h2 class="fw-bold mb-4">
			<span class="icon-heart"><i class="fas fa-heart"></i></span>My Likes
		</h2>

		<div class="d-flex justify-content-end mb-4">
			<a th:href="@{/timeline}" class="btn btn-outline-light btn-sm px-3">
				Timelineに戻る </a>
		</div>

		<div class="row" th:if="${not #lists.isEmpty(likeList)}">

			<div class="col-md-4 mb-4" th:each="item : ${likeList}">
				<a th:href="@{/view/{id}(id=${item.id})}" class="card-link">
					<div class="card h-100 shadow-sm">

						<img th:if="${item.thumbnailUrl != null}"
							th:src="${item.thumbnailUrl}" class="card-img-top" alt="サムネイル">
						
						<div th:unless="${item.thumbnailUrl != null}"
							class="card-img-top d-flex align-items-center justify-content-center"
							style="background: #252525;">
							<span class="text-secondary">No Image</span>
						</div>

						<div class="card-body">
							<div class="mb-2">
								<span th:if="${item.category == '1'}" class="badge badge-book">📖 Book</span>
								<span th:if="${item.category == '2'}" class="badge badge-movie">🎬 Movie</span>
								<span th:if="${item.category == '3'}" class="badge badge-game">🎮 Game</span>
							</div>

							<h5 class="card-title mt-2" th:text="${item.title}"></h5>

							<div class="small mb-2 fw-bold text-secondary">
								<span th:if="${item.category == '1'}"
									th:text="'Author: ' + ${item.creator}"></span> 
								<span th:if="${item.category == '2'}"
									th:text="'Director: ' + ${item.creator}"></span> 
								<span th:if="${item.category == '3'}"
									th:text="'Hardware: ' + ${item.publisher}"></span>
							</div>

							<p class="card-text text-secondary-muted"
								th:text="${#strings.abbreviate(item.reviewText, 50)}"></p>
						</div>
					</div>
				</a>
			</div>
		</div>

		<div class="empty-container" th:if="${#lists.isEmpty(likeList)}">
			<p class="text-secondary">まだ「いいね」した作品がありません。</p>
			<a th:href="@{/timeline}" class="text-info text-decoration-none">
				<i class="fas fa-search"></i> タイムラインで作品を探す
			</a>
		</div>

	</div>
</body>
</html>
