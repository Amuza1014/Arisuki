<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete - ArrayList&lt;Suki&gt;</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    /* ログイン画面の共通設定を継承 */
    body {
        background-color: #121212;
        color: #e0e0e0;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        height: 100vh;
        margin: 0;
    }

    /* 左上のロゴ（ログイン画面と同じ） */
    .brand-logo {
        position: absolute;
        top: 20px;
        left: 20px;
        font-weight: bold;
        font-size: 1.5rem;
        color: #2ecc71;
        text-decoration: none;
        letter-spacing: 1px;
    }

    .wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
    }

    /* ログインコンテナと同じスタイル */
    .complete-container {
        width: 100%;
        max-width: 450px;
        background: #1e1e1e; /* ログイン画面の雰囲気に合わせた暗いグレー */
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        border: 1px solid #333;
    }

    /* 完了メッセージ（ネオングリーン） */
    .text-neon-green {
        color: #39ff14 !important;
        text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        font-weight: bold;
    }

    /* ラベルの色 */
    .info-label {
        color: #2ecc71;
        font-size: 0.9rem;
        font-weight: 500;
    }

    /* メインボタン */
    .btn-custom-green {
        background-color: #2ecc71;
        border: none;
        color: white;
        font-weight: bold;
        padding: 12px;
        transition: 0.3s;
        text-decoration: none;
        display: block;
        width: 100%;
        border-radius: 8px;
    }

    .btn-custom-green:hover {
        background-color: #27ae60;
        color: white;
        box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
    }

    .divider {
        border-top: 1px solid #333;
        margin: 25px 0;
    }
</style>
</head>
<body>
    <a href="/mypage" class="brand-logo">
        <div>ArrayList&lt;Suki&gt;</div>
        <div style="font-size: 0.9rem; font-weight: normal; opacity: 0.8; margin-top: -5px;">-Arisuki-</div>
    </a>

    <div class="wrapper">
        <div class="complete-container text-center">
            <h3 class="text-neon-green mb-4" th:text="${isEdit} ? 'Success: 編集完了' : 'Success: 登録完了'">
                完了しました
            </h3>

            <div class="text-start bg-dark p-3 rounded border border-secondary mb-4">
                <p class="mb-2">
                    <span class="info-label">Title:</span><br>
                    <strong class="text-white fs-5" th:text="${item.title}">タイトル</strong>
                </p>
                <div class="divider my-2" style="opacity: 0.3;"></div>
                <p class="mb-0">
                    <span class="info-label">Review:</span><br>
                    <span class="small text-secondary" 
                          th:text="${#strings.abbreviate(item.reviewText, 100)}">レビュー内容</span>
                </p>
            </div>
            
            <div class="mt-4">
                <a th:href="@{/mypage}" class="btn btn-custom-green">My Collections に戻る</a>
            </div>
        </div>
    </div>

    <footer style="text-align: center; font-size: 0.8em; color: #666; padding: 2em 0; position: absolute; bottom: 0; width: 100%;">
        &copy; 2026 Cチーム(仮) All Rights Reserved.
    </footer>
</body>
</html>
